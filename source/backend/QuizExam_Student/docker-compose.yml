services:
    app:
        build: .
        container_name: quiz-exam-backend
        ports:
            - "8080:8080"
        volumes:
            - ./uploads:/app/uploads
            - ./target/classes:/app/target/classes
        depends_on:
            db:
                condition: service_healthy
        networks:
            - dev_network
        x-develop:
            watch:
                - action: sync
                  path: ./target/classes
                  target: /app/target/classes

    db:
        image: mysql:8.0
        container_name: quiz-exam-db
        command: --skip-name-resolve
        environment:
            - MYSQL_DATABASE=db_test
            - MYSQL_ROOT_PASSWORD=12345678
        ports:
            - "3306:3306"
        volumes:
            - mysql_data:/var/lib/mysql
            - ./db.sql:/docker-entrypoint-initdb.d/db.sql:ro
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
            timeout: 5s
            retries: 10
        networks:
            - dev_network

volumes:
    mysql_data:

networks:
    dev_network:
        name: dev_network
        driver: bridge
        external: true
